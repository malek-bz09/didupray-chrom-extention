<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="popup.css">
</head>

<body>

<div class="container">

    <div class="logo">&#128332</div>

    <h1 class="title">DID U PRAY?</h1>

    
    <div id="waiting-screen" class="prayer-card">

        <p class="label">Next Prayer</p>

        <h2 id="next-prayer-name"></h2>

        <p id="next-prayer-time"></p>

        <p id="countdown"></p>

        <p id="location-display" class="location-text"></p>

        <button id="notify-btn" class="btn">
            Notify Me
        </button>

    </div>


    <div id="adhan-screen" class="prayer-card hidden">

        <p class="label">Time For</p>

        <h2 id="current-prayer"></h2>

        <p id="current-prayer-time"></p>

        <button id="pray-btn" class="btn">
            Wlh I Prayed
        </button>

    </div>

    <button id="settings-toggle" class="gear-btn">&#9881;&#65039;</button>

    <div id="settings-panel" class="prayer-card hidden">
        <h3>Settings</h3>
        <input id="settings-city"    type="text"  placeholder="City" />
        <input id="settings-country" type="text"  placeholder="Country" />
        <select id="settings-method">
            <option value="0">Shia Ithna-Ashari (Leva, Qum)</option>
            <option value="19">Algeria</option>
            <option value="12">France (UOIF)</option>
            <option value="3">Muslim World League</option>
            <option value="2">ISNA (North America)</option>
            <option value="5">Egyptian General Authority</option>
            <option value="4">Umm Al-Qura (Makkah)</option>
            <option value="1">Karachi (UI Sciences)</option>
            <option value="7">Tehran</option>
            <option value="8">Gulf Region</option>
            <option value="9">Kuwait</option>
            <option value="10">Qatar</option>
            <option value="11">Singapore</option>
            <option value="13">Diyanet Turkey</option>
            <option value="14">Russia</option>
            <option value="15">Moonsighting Committee</option>
            <option value="16">Dubai</option>
            <option value="17">JAKIM (Malaysia)</option>
            <option value="18">Tunisia</option>
            <option value="20">Kemenag (Indonesia)</option>
            <option value="21">Morocco</option>
            <option value="22">Portugal</option>
            <option value="23">Jordan</option>
        </select>
        <div class="settings-actions">
            <button id="settings-save"   class="btn">Save</button>
            <button id="settings-cancel" class="btn btn-secondary">Cancel</button>
        </div>
        <p id="settings-status"></p>
    </div>

</div>

<script src="popup.js"></script>

</body>
</html>
